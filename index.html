<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IKUN 图标 - 格式欺骗测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    #image-container {
      margin: 20px 0;
      min-height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #image-container img {
      max-width: 100%;
      height: auto;
      border: 2px solid #eee;
      border-radius: 10px;
      padding: 10px;
      background: #f9f9f9;
    }
    
    .info {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 10px;
      font-size: 12px;
      color: #666;
      text-align: left;
    }
    
    .info strong {
      color: #333;
    }
    
    .tech-demo {
      margin-top: 15px;
      font-size: 11px;
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 IKUN 图标</h1>
    <p class="subtitle">微信二维码 · 格式欺骗测试</p>
    
    <div id="image-container">加载中...</div>
    
    <div class="info">
      <strong>🤔 黑科技说明：</strong><br>
      这个页面的图片文件名为 <code>icon.ikun</code><br>
      - 后缀是自定义的 <code>.ikun</code><br>
      - 实际内容是 <code>PNG</code> 格式<br>
      - 浏览器通过文件头识别，忽略后缀<br>
      → 这就是为什么你能看到二维码！
    </div>
    
    <p class="tech-demo">
      技术演示：浏览器内容嗅探 (MIME Sniffing)
    </p>
  </div>

  <script>
    const img = new Image();
    img.src = 'icon.ikun'; // 后缀自定义，内容是 PNG
    img.alt = '微信二维码 - IKUN';

    img.onload = function() {
      document.getElementById('image-container').innerHTML = '';
      document.getElementById('image-container').appendChild(img);
    };

    img.onerror = function() {
      document.getElementById('image-container').innerHTML = '❌ 图片加载失败';
      console.error('无法加载 icon.ikun，请检查文件是否存在且为有效图片');
    };
  </script>
</body>
</html>
